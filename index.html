<!DOCTYPE html>
<html lang="en">
<head>
    <title>VoxelAR 2026 - Gesture Builder</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #info {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        .controls-hint {
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div id="info">
        <div class="controls-hint">
            <b>Pinch Index Finger</b> to Place Voxel
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';
        import { XRHandModelFactory } from 'three/addons/webxr/XRHandModelFactory.js';

        let container;
        let camera, scene, renderer;
        let hand1, hand2;
        let controllerModelFactory, handModelFactory;

        const voxelSize = 0.05; // 5cm grid
        const voxels = [];

        init();
        animate();

        function init() {
            container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // Lighting for depth
            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 3);
            light.position.set(0.5, 1, 0.25);
            scene.add(light);

            // Renderer Setup
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);

            // AR Button with Hand Tracking feature request
            document.body.appendChild(ARButton.createButton(renderer, { 
                optionalFeatures: ['hand-tracking', 'layers'] 
            }));

            // Controllers & Hand Models
            controllerModelFactory = new XRControllerModelFactory();
            handModelFactory = new XRHandModelFactory();

            // Setup Right Hand (Hand 1)
            hand1 = renderer.xr.getHand(1);
            hand1.add(handModelFactory.createHandModel(hand1, "mesh"));
            scene.add(hand1);

            // Pinch Event Listener
            hand1.addEventListener('pinchend', () => {
                // Get the index finger tip joint
                const indexTip = hand1.joints['index-finger-tip'];
                if (indexTip) {
                    spawnVoxel(indexTip.position);
                }
            });

            window.addEventListener('resize', onWindowResize);
        }

        function spawnVoxel(position) {
            const geometry = new THREE.BoxGeometry(voxelSize, voxelSize, voxelSize);
            const material = new THREE.MeshStandardMaterial({ 
                color: Math.random() * 0xffffff,
                roughness: 0.7 
            });
            const voxel = new THREE.Mesh(geometry, material);

            // Grid Snapping Logic
            voxel.position.x = Math.round(position.x / voxelSize) * voxelSize;
            voxel.position.y = Math.round(position.y / voxelSize) * voxelSize;
            voxel.position.z = Math.round(position.z / voxelSize) * voxelSize;

            scene.add(voxel);
            voxels.push(voxel);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render() {
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
